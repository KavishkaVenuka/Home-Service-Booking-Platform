name: CI/CD — HomeServe Platform

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a new commit is pushed to the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKER_REGISTRY: docker.io
  BACKEND_IMAGE:   ${{ secrets.DOCKERHUB_USERNAME }}/homeserve-backend
  FRONTEND_IMAGE:  ${{ secrets.DOCKERHUB_USERNAME }}/homeserve-frontend

jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Lint & Test — Backend
  # ─────────────────────────────────────────────────────────────────────────────
  test-backend:
    name: 🧪 Test Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       test_db
          POSTGRES_USER:     test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: ⬇️  Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: 🧪 Run backend tests
        working-directory: backend
        env:
          NODE_ENV:    test
          PORT:        5000
          DB_HOST:     localhost
          DB_PORT:     5432
          DB_NAME:     test_db
          DB_USER:     test_user
          DB_PASSWORD: test_password
          JWT_SECRET:  ci_test_jwt_secret
        run: npm test

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Lint — Frontend
  # ─────────────────────────────────────────────────────────────────────────────
  test-frontend:
    name: 🎨 Lint Frontend
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️  Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: 🔍 Run lint
        working-directory: frontend
        run: npm run lint

      - name: 🏗️  Build frontend
        working-directory: frontend
        run: npm run build

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Build & Push Docker Images (only on push to main)
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: ⬇️  Checkout code
        uses: actions/checkout@v4

      - name: 🔑 Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏗️  Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🐳 Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: 🐳 Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 4: Deploy notification (placeholder — extend with SSH/ECS deploy)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: ✅ Deployment placeholder
        run: |
          echo "🚀 Images pushed:"
          echo "  Backend:  ${{ env.BACKEND_IMAGE }}:${{ github.sha }}"
          echo "  Frontend: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}"
          echo ""
          echo "📌 Next step: Add SSH deploy step or AWS ECS task update here."
          echo "   Example: ssh ubuntu@<EC2_IP> 'docker pull ... && docker-compose up -d'"
