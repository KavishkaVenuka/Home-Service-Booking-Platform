name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy repository to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "."
          target: "/home/ec2-user/Home-Service-Booking-Platform"

      - name: Build and Restart on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Build the Backend
            echo "Deploying Backend..."
            cd /home/ec2-user/Home-Service-Booking-Platform/backend
            npm install
            
            # Restart or start the backend with PM2
            pm2 restart backend || pm2 start server.js --name backend
            pm2 save

            # 2. Build the Frontend
            echo "Deploying Frontend..."
            cd /home/ec2-user/Home-Service-Booking-Platform/frontend
            npm install
            npm run build

            # 3. Update Nginx configuration and fix permissions
            echo "Updating Nginx and fixing permissions..."
            sudo chmod +x /home/ec2-user
            sudo chmod -R a+rx /home/ec2-user/Home-Service-Booking-Platform/frontend/dist
            sudo cp /home/ec2-user/Home-Service-Booking-Platform/deployment/nginx.conf /etc/nginx/conf.d/homeserve.conf
            sudo systemctl restart nginx

            echo "✅ Deployment Successful!"
